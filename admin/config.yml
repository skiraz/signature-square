backend:
  name: git-gateway
  branch: main

media_folder: "assets/uploads"
public_folder: "/assets/uploads"

site_url: "https://signaturesquare.netlify.app"
display_url: "https://signaturesquare.netlify.app"

collections:
  - name: "menu"
    label: "Menu Categories"
    label_singular: "Category"
    folder: "content/menu"
    create: false
    delete: false
    identifier_field: "name"
    summary: "{{name}}"
    fields:
      - {label: "Category ID (no spaces — matches the menu page link, don't change on existing categories)", name: "id", widget: "string"}
      - {label: "Category Name", name: "name", widget: "string"}
      - {label: "Category Note (optional, shown under the title)", name: "note", widget: "string", required: false}
      - label: "Items"
        name: "items"
        widget: "list"
        label_singular: "Item"
        summary: "{{fields.name}} — {{fields.price}} JD"
        fields:
          - {label: "Item Name", name: "name", widget: "string"}
          - {label: "Price (JD)", name: "price", widget: "string"}
          - {label: "Note (e.g. 'spicy / regular')", name: "note", widget: "string", required: false}
          - {label: "Mark as a Signature item", name: "signature", widget: "boolean", default: false}
          - {label: "Photo (optional)", name: "photo", widget: "image", required: false}
